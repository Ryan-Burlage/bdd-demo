name: BDD Tests

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:

jobs:
  bdd:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Cucumber tests
        run: npm test

      - name: Upload results to qTest Manager
        if: always()
        env:
          QTEST_URL: ${{ secrets.QTEST_URL }}
          QTEST_TOKEN: ${{ secrets.QTEST_TOKEN }}
          QTEST_PROJECT_ID: ${{ secrets.QTEST_PROJECT_ID }}
          QTEST_TEST_CYCLE: ${{ secrets.QTEST_TEST_CYCLE }}
          JUNIT_PATH: reports/junit-report.xml
        run: node scripts/qtest-upload-junit.js

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: bdd-reports
          path: reports/